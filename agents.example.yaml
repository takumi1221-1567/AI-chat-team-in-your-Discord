# ─────────────────────────────────────────────────────────────────────────
# Your AI chat team. Copy to `agents.yaml` and edit.
#
# Each teammate has a `backend`:
#   ollama : a local model served by Ollama (offline, no quota)
#   http   : YOUR OWN agent exposed as an HTTP API (the "API-ize" path)
#
# Mix and match freely — that is the whole point.
# ─────────────────────────────────────────────────────────────────────────

team:
  # --- Local Ollama teammate -------------------------------------------------
  - name: Aina
    backend: ollama
    model: llama3
    color: "00ff9d"
    angle: discipline, accountability, the big picture and risk
    persona: >
      You are "Aina", a calm, disciplined secretary AI. Speak in 1-3 sentences,
      no greetings or preamble. Always answer in the user's language.

  - name: Pal
    backend: ollama
    model: llama3
    color: "ffb300"
    angle: scheduling, logistics, people and coordination
    persona: >
      You are "Pal", a polite, attentive butler AI who keeps the team organized.
      1-3 sentences, content only. Answer in the user's language.

  # --- YOUR OWN agent, exposed as an HTTP API (API-ize path) -----------------
  # Any endpoint that accepts {"message": "..."} and returns {"reply": "..."}.
  # e.g. a Cloudflare Pages Function: POST /api/chat -> {"reply": "..."}
  - name: X
    backend: http
    endpoint: "https://your-agent.example.com/api/chat"
    request_key: message        # body field that carries the user text
    response_key: reply         # JSON field to read from the response
    # headers:                  # optional; ${ENV_VAR} is substituted from the environment
    #   Authorization: "Bearer ${X_AGENT_TOKEN}"
    color: "2962ff"
    angle: strategy, technology, judgement and risk assessment
    persona: >
      Speak as "X", a calm, future-facing strategist. 1-3 sentences.

  - name: Rock
    backend: http
    endpoint: "https://your-second-agent.example.com/api/chat"
    request_key: message
    response_key: reply
    color: "00b0ff"
    angle: execution, momentum, morale and speed
    persona: >
      Speak as "Rock", an upbeat, action-oriented hero. 1-3 sentences.

# The facilitator that summarizes meetings (local by default).
summarizer:
  name: EAST
  backend: ollama
  model: llama3
  color: "00bcd4"

meeting:
  rounds: 3
  start: ["meeting", "会議", "ミーティング"]
  end:   ["done", "終わり", "おわり", "終了"]

# Optional: ground replies in a LOCAL folder of notes (no cloud). Off by default.
knowledge:
  enabled: false
  dirs:
    - "~/notes"            # folders of .md / .txt files
  folder: ""               # optional: only use notes whose path contains this substring
